name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Loom
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/fabric-loom
            ~/.gradle/caches/loom-cache
          key: ${{ runner.os }}-loom-${{ hashFiles('**/build.gradle', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-loom-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build with Gradle
        run: ./gradlew build --no-daemon -Dorg.gradle.configuration-cache=false --info

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fabric-1.21.11/build/libs/*.jar
            neoforge-1.21.1/build/libs/*.jar
            fabric-26.1.2/build/libs/*.jar
            forge-1.20.1/build/libs/*.jar
            !**/*-sources.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
