#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#

version: "1.0"

profile:
  name: qodana.starter

projectJDK: "25"

# Exclude auto-generated and build dirs from analysis
exclude:
  - name: All
    paths:
      - build
      - .gradle
      - run
      - "**/build"
      - "**/.gradle"
      - "**/run"

linter: jetbrains/qodana-jvm-community:2026.1
